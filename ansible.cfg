[defaults]
# Inventory - override per run with: -i inventories/<env>/hosts.yml
inventory = inventories/dev/hosts.yml
roles_path = roles
collections_path = collections

# Output
stdout_callback = yaml
callback_whitelist = ansible.posix.profile_tasks

# Performance
forks = 10
timeout = 30
pipelining = true

# Misc
retry_files_enabled = false
host_key_checking = false
interpreter_python = auto_silent

[privilege_escalation]
# NOTE: become is set per-playbook, not globally.
# This section provides defaults when become=true is used.
become_method = sudo
become_user = root
become_ask_pass = false
