---
# playbooks/deploy_k3s.yml - K3s Kubernetes server deployment
# AWX Job Template: point to this playbook with inventory for target environment.
#
# Usage:
#   ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventories/dev/hosts.yml playbooks/deploy_k3s.yml
#   ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventories/dev/hosts.yml playbooks/deploy_k3s.yml --limit centos-01
#   ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventories/dev/hosts.yml playbooks/deploy_k3s.yml --check --diff

- name: Deploy K3s server
  hosts: centos
  become: true
  gather_facts: true

  roles:
    - role: k3s
      tags:
        - k3s
