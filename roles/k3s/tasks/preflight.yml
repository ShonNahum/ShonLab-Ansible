---
# tasks/preflight.yml - Pre-installation checks

- name: Gather OS facts
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!min"
      - os_family
      - distribution
      - distribution_version

- name: Verify supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}. K3s requires Debian or RedHat based systems."
    success_msg: "OS family {{ ansible_os_family }} is supported."

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Get current k3s version
  ansible.builtin.command: k3s --version
  register: k3s_current_version
  changed_when: false
  when: k3s_binary.stat.exists

- name: Display current k3s version
  ansible.builtin.debug:
    msg: "K3s is already installed: {{ k3s_current_version.stdout | default('not installed') }}"
  when: k3s_binary.stat.exists
