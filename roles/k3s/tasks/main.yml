---
# tasks/main.yml - k3s server installation

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Display current k3s version
  ansible.builtin.command: k3s --version
  register: k3s_current_version
  changed_when: false
  when: k3s_binary.stat.exists

- name: Show k3s status
  ansible.builtin.debug:
    msg: "{{ k3s_current_version.stdout if k3s_binary.stat.exists else 'k3s is not installed — will install now' }}"

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: '0755'

- name: Install k3s server
  ansible.builtin.command: >
    /tmp/k3s_install.sh server
    --write-kubeconfig-mode {{ k3s_kubeconfig_mode }}
    {{ k3s_extra_args }}
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version | default('', true) }}"
    INSTALL_K3S_CHANNEL: "{{ k3s_channel }}"
  args:
    creates: /usr/local/bin/k3s
  notify: Restart k3s

- name: Ensure k3s service is started and enabled
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_ready
  retries: 20
  delay: 5
  until: k3s_ready.rc == 0
  changed_when: false

- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  when: k3s_kubectl_symlink

- name: Set up kubeconfig for user
  block:
    - name: Create .kube directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: "0755"

    - name: Copy kubeconfig to user home
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ ansible_env.HOME }}/.kube/config"
        remote_src: true
        mode: "0600"
