---
# tasks/install_server.yml - K3s server installation

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"

- name: Build k3s install arguments
  ansible.builtin.set_fact:
    k3s_install_args: >-
      {{
        (k3s_disable_components | map('regex_replace', '^(.*)$', '--disable \1') | list | join(' '))
        + ' --write-kubeconfig-mode ' + k3s_write_kubeconfig_mode
        + ' --data-dir ' + k3s_data_dir
        + (' ' + k3s_server_extra_args if k3s_server_extra_args else '')
      }}

- name: Install k3s server
  ansible.builtin.command:
    cmd: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version | default(omit, true) }}"
    INSTALL_K3S_CHANNEL: "{{ k3s_channel }}"
    INSTALL_K3S_EXEC: "server {{ k3s_install_args | trim }}"
  args:
    creates: /usr/local/bin/k3s
  notify: Restart k3s

- name: Ensure k3s service is started and enabled
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  retries: 12
  delay: 10
  until: k3s_nodes.rc == 0
  changed_when: false

- name: Clean up install script
  ansible.builtin.file:
    path: /tmp/k3s-install.sh
    state: absent
