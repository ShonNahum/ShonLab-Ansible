---
# tasks/main.yml - common_ubuntu role tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - common
    - packages

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: "{{ common_ubuntu_upgrade_type }}"
  when: common_ubuntu_upgrade
  tags:
    - common
    - packages
    - upgrade

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_ubuntu_packages }}"
    state: present
  tags:
    - common
    - packages

- name: Set timezone
  community.general.timezone:
    name: "{{ common_ubuntu_timezone }}"
  notify: Restart cron
  tags:
    - common
    - timezone

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: common_ubuntu_set_hostname
  tags:
    - common
    - hostname

- name: Enable unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  when: common_ubuntu_auto_updates
  tags:
    - common
    - security
